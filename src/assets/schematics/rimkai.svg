<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 620" class="schematic">
  <!--
    SIMPLIFIED placeholder schematic of Rimkų g. st.
    Switch numbers (iešmai) and point machines (M..) are REAL, read from plan
    SIII-S008-00-DP-GRS-RIM-BR-01. Track GEOMETRY is approximate and will be
    replaced by an accurately traced layout. Each switch is a <g data-element-id>
    group with a node circle, a transparent ≥48px tap target, and a label.
  -->

  <!-- direction + station labels -->
  <text class="dir" x="24" y="40" text-anchor="start">&#8592; VILKYČIAI / DRAUGYSTĖ</text>
  <text class="dir" x="1376" y="40" text-anchor="end">KLAIPĖDA &#8594;</text>
  <text class="title" x="700" y="40" text-anchor="middle">RIMKŲ g. st.</text>

  <!-- siding labels -->
  <text class="siding" x="24" y="124">UAB „Geležies laužas“</text>
  <text class="siding" x="24" y="464">UAB „Klaipėdos energija“ / AB „Gelsta“</text>
  <text class="siding" x="24" y="524">AB „Klaipėdos keliai“</text>

  <!-- ===== background tracks ===== -->
  <g class="tracks" fill="none" stroke="#94a3b8" stroke-width="3">
    <!-- upper siding -->
    <polyline points="120,130 1280,130" />
    <!-- main track I -->
    <polyline points="60,290 1340,290" stroke="#cbd5e1" stroke-width="4" />
    <!-- main track II -->
    <polyline points="60,350 1340,350" stroke="#cbd5e1" stroke-width="4" />
    <!-- lower sidings -->
    <polyline points="120,440 1240,440" />
    <polyline points="160,500 940,500" />
    <!-- diverging connectors (decorative) -->
    <polyline points="200,290 260,130" />
    <polyline points="300,350 360,440" />
    <polyline points="520,440 580,500" />
    <polyline points="820,290 900,200 1060,200" />
    <polyline points="980,440 1060,350" />
    <polyline points="1140,290 1200,200" />
  </g>

